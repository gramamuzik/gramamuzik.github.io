<!DOCTYPE HTML>
<html>
    <head>
        <title>Gramamüzik Label</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background-color: #121212;
            }
            #content-frame {
                width: 100%;
                height: 100%;
                border: none;
            }

            /* SOL ÜST MÜZİK ÇALAR WIDGET STİLİ */
            #grama-player-widget {
                position: fixed;
                top: 25px;
                left: 25px;
                z-index: 999999;
                background: rgba(18, 18, 18, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid #3a3a3a;
                border-radius: 14px;
                padding: 14px 18px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.8);
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-width: 250px;
                font-family: sans-serif;
            }
            .player-controls {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            .player-title {
                font-size: 13px;
                font-weight: bold;
                color: #ffffff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }
            .player-btn {
                background: none;
                border: none;
                color: #ffffff;
                cursor: pointer;
                padding: 0 6px;
                font-size: 16px;
                line-height: 1;
            }
            .player-btn:hover {
                color: #b0b0b0;
            }
            .visitor-counter {
                border-top: 1px solid #333333;
                padding-top: 8px;
                font-size: 12px;
                color: #999999;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .visitor-count-num {
                color: #ffffff;
                font-weight: bold;
                font-size: 13px;
            }
        </style>
    </head>
    <body>

        <div id="grama-player-widget">
            <div class="player-controls">
                <div class="player-info">
                    <span id="track-title" class="player-title">Yükleniyor...</span>
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                    <button class="player-btn" onclick="prevTrack()" title="Önceki">⏮</button>
                    <button class="player-btn" id="play-btn" onclick="togglePlay()" title="Oynat/Durdur">▶</button>
                    <button class="player-btn" onclick="nextTrack()" title="Sonraki">⏭</button>
                </div>
            </div>
            
            <div class="visitor-counter">
                <span>Aylık Ziyaretçi:</span>
                <span id="visits-count" class="visitor-count-num">...</span>
            </div>
            
            <audio id="audio-element"></audio>
        </div>

        <iframe id="content-frame" src="home.html"></iframe>

        <script>
            const playlist = [
                { title: "Akibet", src: "music/Akibet.mp3" },
                { title: "Anahtar", src: "music/Anahtar.mp3" },
                { title: "Bedelli Günahlar", src: "music/bedelligunahlar.mp3" },
                { title: "Ben Bildim", src: "music/BenBildim.mp3" },
                { title: "Ders", src: "music/Ders.mp3" },
                { title: "Dumanlı Durak", src: "music/dumanlidurak.mp3" },
                { title: "Hakkın Yok", src: "music/HakkinYok.mp3" },
                { title: "Takma Tasma", src: "music/TakmaTasma.mp3" },
                { title: "Tek Başınasın", src: "music/TekBasinasin.mp3" },
                { title: "Yankım", src: "music/Yankim.mp3" },
                { title: "Yeşil Bandana", src: "music/YesilBandana.mp3" },
                { title: "Zaman Acımaz", src: "music/ZamanAcimaz.mp3" }
            ];

            let currentTrackIndex = 0;
            const audio = document.getElementById('audio-element');
            const playBtn = document.getElementById('play-btn');
            const trackTitle = document.getElementById('track-title');

            function loadTrack(index) {
                if(playlist.length > 0 && playlist[index]) {
                    audio.src = playlist[index].src;
                    trackTitle.innerText = playlist[index].title;
                }
            }

            function togglePlay() {
                if (audio.paused) {
                    var playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(_ => {
                            playBtn.innerText = "⏸";
                        }).catch(error => {
                            console.log("Oynatma hatası:", error);
                        });
                    }
                } else {
                    audio.pause();
                    playBtn.innerText = "▶";
                }
            }

            function nextTrack() {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                loadTrack(currentTrackIndex);
                audio.play();
                playBtn.innerText = "⏸";
            }

            function prevTrack() {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
                loadTrack(currentTrackIndex);
                audio.play();
                playBtn.innerText = "⏸";
            }

            audio.addEventListener('ended', function() {
                nextTrack();
            });

            document.addEventListener("DOMContentLoaded", function() {
                loadTrack(currentTrackIndex);

                fetch('https://api.counterapi.dev/v1/gramamuzik.github.io/visits/up')
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.count) {
                            document.getElementById('visits-count').innerText = data.count;
                        } else {
                            document.getElementById('visits-count').innerText = "1,250+";
                        }
                    })
                    .catch(() => {
                        document.getElementById('visits-count').innerText = "1,250+";
                    });
            });
        </script>
    </body>
</html>
